name: Visual Regression Gate

on:
  # Auto-run on PR and push  
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'android/**'
      - 'shared/test-cards/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'ios/**'
      - 'android/**'
      - 'shared/test-cards/**'

  # Manual trigger for recording baselines
  workflow_dispatch:
    inputs:
      record_baselines:
        description: 'Record new baselines instead of comparing'
        type: boolean
        default: false
      platform:
        description: 'Platform to test'
        type: choice
        options:
          - both
          - ios
          - android
        default: 'both'

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------
  # iOS Visual Regression
  # ---------------------------------------------------------------
  ios-visual:
    name: iOS Visual Regression
    if: ${{ github.event.inputs.platform != 'android' }}
    runs-on: macos-14
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'

    - name: Card inventory
      run: |
        echo "=== Test Card Inventory ==="
        echo "Total: $(find shared/test-cards -name '*.json' | wc -l | tr -d ' ') cards"

    - name: Prepare xcodebuild (hide xcodeproj so Package.swift is used)
      working-directory: ios
      run: |
        # xcodebuild picks up SampleApp.xcodeproj over Package.swift
        # Hide it so the SPM package scheme is used instead
        mv SampleApp.xcodeproj _SampleApp.xcodeproj.bak 2>/dev/null || true

    - name: Set up recording mode
      if: ${{ github.event.inputs.record_baselines == 'true' }}
      working-directory: ios
      run: |
        mkdir -p Tests/VisualTests/Snapshots
        touch Tests/VisualTests/Snapshots/.record
        echo "Recording mode enabled via .record flag file"

    - name: Boot iOS Simulator
      run: |
        xcrun simctl boot "iPhone 15 Pro" 2>/dev/null || true
        xcrun simctl list devices booted

    - name: Run iOS visual tests (all)
      working-directory: ios
      run: |
        echo "=== Running ALL visual tests via xcodebuild ==="
        xcodebuild test \
          -scheme AdaptiveCards-Package \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          -only-testing:VisualTests \
          -skipPackagePluginValidation \
          CODE_SIGNING_ALLOWED=NO \
          -resultBundlePath ../build/ios-results \
          2>&1 | tee /tmp/ios-test-output.log | tail -100 || true
        echo ""
        echo "=== Test Summary ==="
        grep -E 'Executed|TEST|PASS|FAIL|error:' /tmp/ios-test-output.log | tail -20 || true

    - name: Restore xcodeproj
      if: always()
      working-directory: ios
      run: mv _SampleApp.xcodeproj.bak SampleApp.xcodeproj 2>/dev/null || true

    - name: Upload baselines
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-baselines
        path: ios/Tests/VisualTests/Snapshots/Baselines/
        retention-days: 90

    - name: Upload failures & diffs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: ios-visual-failures
        path: |
          ios/Tests/VisualTests/Snapshots/Failures/
          ios/Tests/VisualTests/Snapshots/Diffs/
        retention-days: 14

    - name: Upload HTML reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-visual-reports
        path: ios/Tests/VisualTests/Snapshots/Reports/
        retention-days: 30

  # ---------------------------------------------------------------
  # Android Visual Regression (Paparazzi)
  # ---------------------------------------------------------------
  android-visual:
    name: Android Visual Regression
    if: ${{ github.event.inputs.platform != 'ios' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Card inventory
      run: |
        echo "=== Test Card Inventory ==="
        echo "Total: $(find shared/test-cards -name '*.json' | wc -l | tr -d ' ') cards"

    - name: Record Paparazzi baselines
      if: ${{ github.event.inputs.record_baselines == 'true' }}
      working-directory: android
      run: |
        echo "🔴 RECORDING MODE — recording new Paparazzi baselines"
        ./gradlew :ac-rendering:recordPaparazziDebug --stacktrace

    - name: Verify Paparazzi snapshots
      if: ${{ github.event.inputs.record_baselines != 'true' }}
      working-directory: android
      run: |
        echo "🟢 VERIFY MODE — comparing against Paparazzi baselines"
        ./gradlew :ac-rendering:verifyPaparazziDebug --stacktrace

    - name: Upload baselines
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: android-baselines
        path: android/ac-rendering/src/test/snapshots/
        retention-days: 90

    - name: Upload diffs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: android-visual-failures
        path: android/ac-rendering/out/failures/
        retention-days: 14
